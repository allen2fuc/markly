<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markly</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: #e4e3de;
    --border2: #d0cfc9;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --accent: #5046e5;
    --accent-bg: #eeedfd;
    --accent-text: #3730c4;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #242422;
      --border: #2e2e2b;
      --border2: #3a3a36;
      --text: #e8e8e4;
      --text2: #9a9993;
      --text3: #636360;
      --accent: #7b72ff;
      --accent-bg: #1e1c3a;
      --accent-text: #a09bff;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── topbar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,243,.9);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; gap: 16px;
  }
  @media (prefers-color-scheme: dark) { .topbar { background: rgba(17,17,16,.9); } }

  .logo {
    font-size: 15px; font-weight: 700; letter-spacing: -.3px;
    color: var(--text); display: flex; align-items: center; gap: 7px;
    text-decoration: none; white-space: nowrap;
  }
  .logo-icon {
    width: 26px; height: 26px; background: var(--accent);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { display: block; }
  .topbar-kw { font-size: 12px; color: var(--text3); margin-left: auto; white-space: nowrap; }

  /* ── search hero ── */
  .hero {
    padding: 40px 24px 32px;
    display: flex; flex-direction: column; align-items: center;
  }
  .hero-title {
    font-size: 28px; font-weight: 800; letter-spacing: -.6px;
    color: var(--text); margin-bottom: 6px; text-align: center;
  }
  .hero-sub { font-size: 14px; color: var(--text3); margin-bottom: 28px; text-align: center; }

  /* engine tabs */
  .engine-tabs {
    display: flex; gap: 0; margin-bottom: 12px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 3px; border: 1px solid var(--border);
  }
  .engine-tab {
    padding: 6px 16px; border-radius: 4px; border: none;
    background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text3); transition: background .15s, color .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .engine-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .engine-tab img { width: 14px; height: 14px; object-fit: contain; }

  /* search input */
  .search-box {
    width: 100%; max-width: 580px;
    display: flex; gap: 0;
    background: var(--surface); border: 1.5px solid var(--border2);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: border-color .15s, box-shadow .15s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(80,70,229,.12);
  }
  .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-input-wrap { flex: 1; position: relative; }
  #search-input {
    width: 100%; height: 46px; padding: 0 12px 0 42px;
    border: none; background: transparent; color: var(--text);
    font-size: 15px; outline: none;
  }
  #search-input::placeholder { color: var(--text3); }
  .search-btn {
    height: 46px; padding: 0 22px;
    background: var(--accent); color: #fff;
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  .search-btn:hover { opacity: .88; }
  .search-btn svg { flex-shrink: 0; }

  /* ── layout ── */
  .layout {
    display: flex; max-width: 1120px; margin: 0 auto;
    padding: 0 24px 60px; gap: 24px; align-items: flex-start;
  }

  /* ── sidebar ── */
  .sidebar { width: 180px; flex-shrink: 0; position: sticky; top: 72px; }
  .sidebar-section { margin-bottom: 20px; }
  .sidebar-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    letter-spacing: .06em; text-transform: uppercase; padding: 0 10px 8px;
  }
  .filter-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 7px 10px; border: none; border-radius: var(--radius-sm);
    background: transparent; color: var(--text2); font-size: 13px;
    cursor: pointer; text-align: left; transition: background .12s, color .12s;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .tag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .filter-count {
    margin-left: auto; font-size: 11px; color: var(--text3);
    background: var(--surface2); border-radius: 99px; padding: 1px 6px;
  }
  .filter-btn.active .filter-count { background: var(--accent-bg); color: var(--accent-text); }

  /* ── main ── */
  .main { flex: 1; min-width: 0; }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .main-count { font-size: 12px; color: var(--text3); }

  /* ── grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; cursor: pointer;
    transition: border-color .15s, transform .12s, box-shadow .15s;
    box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 0;
    text-decoration: none; outline: none;
  }
  .card:hover { border-color: var(--border2); box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(80,70,229,.15); }

  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-favicon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    overflow: hidden; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
  }
  .card-favicon img { width: 100%; height: 100%; object-fit: contain; }
  .card-favicon .fallback {
    font-size: 13px; font-weight: 700; color: var(--accent-text);
    background: var(--accent-bg); width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-domain { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; flex: 1; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
  .tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }

  /* ── empty / skeleton ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty svg { margin-bottom: 10px; opacity: .35; }
  .empty p { font-size: 13px; }
  .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; }
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: 140px; overflow: hidden; position: relative; }
  .skeleton-card::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent 0%,var(--surface2) 50%,transparent 100%); animation:shimmer 1.4s infinite; }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

  @media (max-width: 640px) {
    .hero { padding: 28px 16px 20px; }
    .hero-title { font-size: 22px; }
    .sidebar { display: none; }
    .layout { padding: 0 16px 48px; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 1h8a1 1 0 0 1 1 1v10l-4-2.5L4 12V2a1 1 0 0 1 1-1z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    Markly
  </a>
  <span class="topbar-kw" id="topbar-kw"></span>
</header>

<!-- 搜索区 -->
<section class="hero">
  <div class="hero-title">你的书签，你的起点</div>
  <div class="hero-sub">搜索网络，或从下方书签直接跳转</div>

  <div class="engine-tabs" id="engine-tabs">
    <button class="engine-tab" data-engine="baidu" data-url="https://www.baidu.com/s?wd={q}">
      <img src="https://www.google.com/s2/favicons?domain=baidu.com&sz=32" onerror="this.style.display='none'" alt="">百度
    </button>
    <button class="engine-tab" data-engine="google" data-url="https://www.google.com/search?q={q}">
      <img src="https://www.google.com/s2/favicons?domain=google.com&sz=32" onerror="this.style.display='none'" alt="">Google
    </button>
    <button class="engine-tab active" data-engine="bing" data-url="https://www.bing.com/search?q={q}">
      <img src="https://www.google.com/s2/favicons?domain=bing.com&sz=32" onerror="this.style.display='none'" alt="">必应
    </button>
    <button class="engine-tab" data-engine="ddg" data-url="https://duckduckgo.com/?q={q}">
      <img src="https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=32" onerror="this.style.display='none'" alt="">DuckDuckGo
    </button>
  </div>

  <div class="search-box">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="7" cy="7" r="5"/><path d="M12 12l2.5 2.5"/>
      </svg>
      <input type="search" id="search-input" placeholder="搜索…" autocomplete="off" />
    </div>
    <button class="search-btn" id="search-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 7h12M8 3l4 4-4 4"/></svg>
      搜索
    </button>
  </div>
</section>

<!-- 书签区 -->
<div class="layout">
  <nav class="sidebar" id="sidebar" aria-label="标签筛选"></nav>
  <main class="main">
    <div class="main-header">
      <span class="main-count" id="main-count"></span>
    </div>
    <div class="skeleton-grid" id="skeleton">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
    <div id="grid-wrap"></div>
  </main>
</div>

<script>
(function () {
  /* ── 标签颜色 ── */
  const PALETTE = [
    {bg:'#eeedfd',c:'#3730c4'},{bg:'#e1f5ee',c:'#0a6649'},
    {bg:'#faeeda',c:'#7a4a08'},{bg:'#e6f1fb',c:'#1054a0'},
    {bg:'#f3e8ff',c:'#6b21a8'},{bg:'#fde8e8',c:'#9f1239'},
    {bg:'#ecfdf5',c:'#065f46'},{bg:'#fffbeb',c:'#92400e'},
  ];
  const PALETTE_DARK = [
    {bg:'#1e1c3a',c:'#a09bff'},{bg:'#0d2a1f',c:'#4dc494'},
    {bg:'#261d08',c:'#d4a843'},{bg:'#0e1f35',c:'#5fa8ee'},
    {bg:'#2d1a4a',c:'#c084fc'},{bg:'#3b0a0a',c:'#fca5a5'},
    {bg:'#064e3b',c:'#6ee7b7'},{bg:'#451a03',c:'#fcd34d'},
  ];
  const pal = window.matchMedia('(prefers-color-scheme: dark)').matches ? PALETTE_DARK : PALETTE;
  const colorMap = {};
  function tagColor(tag) {
    if (!colorMap[tag]) colorMap[tag] = pal[Object.keys(colorMap).length % pal.length];
    return colorMap[tag];
  }

  /* ── 状态 ── */
  let ALL = [], activeTag = 'all', kw = '', activeEngine = 'bing', activeEngineUrl = 'https://www.bing.com/search?q={q}';

  /* ── 搜索引擎 ── */
  document.getElementById('engine-tabs').querySelectorAll('.engine-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.engine-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeEngine = btn.dataset.engine;
      activeEngineUrl = btn.dataset.url;
      document.getElementById('search-input').focus();
    });
  });

  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    window.open(activeEngineUrl.replace('{q}', encodeURIComponent(q)), '_blank');
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  /* ── 书签过滤 ── */
  function filtered() {
    return ALL.filter(b => {
      if (activeTag !== 'all' && !(b.tags || []).includes(activeTag)) return false;
      if (kw && !b.title.toLowerCase().includes(kw) && !(b.description || '').toLowerCase().includes(kw) && !b.url.toLowerCase().includes(kw)) return false;
      return true;
    });
  }

  /* ── 侧栏 ── */
  function renderSidebar() {
    const counts = {};
    ALL.forEach(b => (b.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    if (!Object.keys(counts).length) { document.getElementById('sidebar').innerHTML = ''; return; }

    let h = '<div class="sidebar-section"><div class="sidebar-label">标签</div>';
    h += `<button class="filter-btn${activeTag === 'all' ? ' active' : ''}" data-tag="all">
      <span style="flex:1">全部</span><span class="filter-count">${ALL.length}</span></button>`;
    Object.entries(counts).sort((a, b) => b[1] - a[1]).forEach(([tag, n]) => {
      const s = tagColor(tag);
      h += `<button class="filter-btn${activeTag === tag ? ' active' : ''}" data-tag="${esc(tag)}">
        <span class="tag-dot" style="background:${s.bg};outline:1px solid ${s.c}55"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tag)}</span>
        <span class="filter-count">${n}</span></button>`;
    });
    h += '</div>';
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = h;
    sidebar.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { activeTag = btn.dataset.tag; renderSidebar(); renderGrid(); });
    });
  }

  /* ── 书签网格 ── */
  function renderGrid() {
    const list = filtered();
    const wrap = document.getElementById('grid-wrap');
    document.getElementById('main-count').textContent = `${list.length} 个书签`;

    if (!list.length) {
      wrap.innerHTML = `<div class="empty">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M10 4h16a2 2 0 0 1 2 2v26l-10-6-10 6V6a2 2 0 0 1 2-2z"/>
        </svg>
        <p>${ALL.length ? '没有匹配的书签' : '还没有书签，前往 /admin 添加'}</p></div>`;
      return;
    }

    const grid = document.createElement('div'); grid.className = 'grid';
    list.forEach(bm => {
      const domain = (() => { try { return new URL(bm.url).hostname; } catch { return ''; } })();
      const iconSrc = bm.icon || (domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '');

      const a = document.createElement('a');
      a.className = 'card'; a.href = bm.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.tabIndex = 0;

      // favicon
      const favicon = document.createElement('div'); favicon.className = 'card-favicon';
      if (iconSrc) {
        const img = document.createElement('img'); img.src = iconSrc; img.alt = '';
        img.onerror = () => { favicon.innerHTML = `<div class="fallback">${(bm.title||'?')[0].toUpperCase()}</div>`; };
        favicon.appendChild(img);
      } else {
        favicon.innerHTML = `<div class="fallback">${(bm.title||'?')[0].toUpperCase()}</div>`;
      }

      const titleWrap = document.createElement('div'); titleWrap.className = 'card-title-wrap';
      titleWrap.innerHTML = `<div class="card-title">${esc(bm.title)}</div><div class="card-domain">${esc(domain)}</div>`;

      const top = document.createElement('div'); top.className = 'card-top';
      top.appendChild(favicon); top.appendChild(titleWrap);

      const desc = document.createElement('div'); desc.className = 'card-desc'; desc.textContent = bm.description || '';

      const tagsRow = document.createElement('div'); tagsRow.className = 'card-tags';
      (bm.tags || []).forEach(t => {
        const s = tagColor(t);
        const span = document.createElement('span'); span.className = 'tag';
        span.textContent = t; span.style.background = s.bg; span.style.color = s.c;
        tagsRow.appendChild(span);
      });

      a.appendChild(top);
      if (bm.description) a.appendChild(desc);
      if ((bm.tags || []).length) a.appendChild(tagsRow);

      grid.appendChild(a);
    });
    wrap.innerHTML = ''; wrap.appendChild(grid);
  }

  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ── 初始化 ── */
  (async () => {
    try { const r = await fetch('/api/bookmarks'); ALL = await r.json(); }
    catch { ALL = []; }
    document.getElementById('skeleton').remove();
    renderSidebar();
    renderGrid();
    document.getElementById('topbar-kw').textContent = ALL.length ? `${ALL.length} 个书签` : '';
  })();
})();
</script>
</body>
</html>
